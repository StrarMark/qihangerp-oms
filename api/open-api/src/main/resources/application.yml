server:
  port: 7010

spring:
  application:
    name: open
  cloud:
    nacos:
      #      serverAddr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
  #        username: nacos
  #        password: nacos
  data:
    # redis 配置
    redis:
      # 地址
      #    host: 8.130.98.215
      host: 127.0.0.1
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      #    password: 123321
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/qihang-erp?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: Andy_123
    hikari:
      maximum-pool-size: 10
      min-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000


mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: cn.qihangerp.open.domain;cn.qihangerp.security.entity;cn.qihangerp.model.entity;
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启sql日志